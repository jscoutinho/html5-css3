<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo Vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>
    <video width="700px" controls poster="imagens/limoes-capa.png">
        <source src="midia/limao.mp4" type="video/mp4">
        <source src="midia/limao.mkv" type="video/mp4">
        <source src="midia/limao.webm" type="video/webm">
        <source src="midia/limao.ogv" type="video/ogg">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video>
</body>
</html>
